services:
  postgres:
    image: postgres:16
    container_name: local_service_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kunal
      POSTGRES_PASSWORD: password
      POSTGRES_DB: local_service_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
